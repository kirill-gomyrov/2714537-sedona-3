<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гостиницы Седоны</title>
  <meta name="description" content="Каталог гостиниц Седоны с фильтрами по инфраструктуре, типу жилья, стоимости и рейтингу.">
  <link rel="icon" href="images/favicon.png" type="image/png" sizes="32x32">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Шапка сайта -->
  <header class="page-header">
    <nav class="navigation" aria-label="Основная навигация">
      <a href="index.html" class="navigation-logo-link">
        <img src="images/logo.svg" alt="Логотип сайта Седона" width="140" height="70">
      </a>

      <!-- Главное меню -->
      <ul class="navigation-list">
        <li class="navigation-item">
          <a href="index.html" class="navigation-link">Главная</a>
        </li>
        <li class="navigation-item">
          <a href="#" class="navigation-link">О Седоне</a>
        </li>
        <li class="navigation-item">
          <a href="catalog.html" aria-current="page" class="navigation-link navigation-link-current">Гостиницы</a>
        </li>
      </ul>

      <!-- Пользовательское меню -->
      <ul class="navigation-user-list">
        <li class="navigation-user-item">
          <a href="#" class="navigation-user-link navigation-user-link-search">
            <span class="visually-hidden">Поиск</span>
          </a>
        </li>
        <li class="navigation-user-item">
          <a href="#" class="navigation-user-link navigation-user-link-favorites">
            <span class="visually-hidden">Избранное</span>
            <span class="navigation-favorites-count">12</span>
          </a>
        </li>
        <li class="navigation-user-item">
          <a href="#" class="navigation-user-button button">Хочу сюда!</a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="page-main page-main-catalog">

    <!-- Фильтр гостиниц -->
    <section class="catalog-hero">
      <h1 class="catalog-title">Гостиницы Седоны</h1>

      <!-- Хлебные крошки -->
      <nav class="breadcrumbs" aria-label="Хлебные крошки">
        <ol class="breadcrumbs-list">
          <li class="breadcrumbs-item">
            <a href="index.html" class="breadcrumbs-link breadcrumbs-link-home">
              <span class="visually-hidden">Главная страница</span>
            </a>
          </li>
          <li class="breadcrumbs-item">
            <span class="breadcrumbs-current" aria-current="page">Гостиницы</span>
          </li>
        </ol>
      </nav>
      <form action="https://echo.htmlacademy.ru/" method="get" class="catalog-filter">
        <fieldset class="catalog-filter-group">
          <legend class="catalog-filter-title">Инфраструктура:</legend>
          <ul class="catalog-filter-list">
            <li class="catalog-filter-item">
              <label class="control">
                <input type="checkbox" class="control-input" name="infrastructure" value="pool" checked>
                <span class="control-label">Бассейн</span>
              </label>
            </li>
            <li class="catalog-filter-item">
              <label class="control">
                <input type="checkbox" class="control-input" name="infrastructure" value="parking" checked>
                <span class="control-label">Парковка</span>
              </label>
            </li>
            <li class="catalog-filter-item">
              <label class="control">
                <input type="checkbox" class="control-input" name="infrastructure" value="wifi">
                <span class="control-label">Wi-Fi</span>
              </label>
            </li>
          </ul>
        </fieldset>

        <fieldset class="catalog-filter-group">
          <legend class="catalog-filter-title">Тип жилья:</legend>
          <ul class="catalog-filter-list">
            <li class="catalog-filter-item">
              <label class="control">
                <input type="radio" class="control-input" name="housing-type" value="hotel" checked>
                <span class="control-label">Гостиница</span>
              </label>
            </li>
            <li class="catalog-filter-item">
              <label class="control">
                <input type="radio" class="control-input" name="housing-type" value="motel">
                <span class="control-label">Мотель</span>
              </label>
            </li>
            <li class="catalog-filter-item">
              <label class="control">
                <input type="radio" class="control-input" name="housing-type" value="apartments">
                <span class="control-label">Апартаменты</span>
              </label>
            </li>
          </ul>
        </fieldset>

        <fieldset class="catalog-filter-group catalog-filter-group-price">
          <legend class="catalog-filter-title">Стоимость, ₽:</legend>
          <div class="price-filter">
            <label class="price-filter-label">
              <input type="number" class="price-filter-input" name="price-min" value="0" min="0">
              <span class="price-filter-text">от</span>
            </label>
            <label class="price-filter-label">
              <input type="number" class="price-filter-input" name="price-max" value="9000" min="0">
              <span class="price-filter-text">до</span>
            </label>
          </div>
          <div class="range">
            <div class="range-scale">
              <div class="range-bar">
                <button class="range-toggle range-toggle-min" type="button">
                  <span class="visually-hidden">Изменить минимальную стоимость</span>
                </button>
                <button class="range-toggle range-toggle-max" type="button">
                  <span class="visually-hidden">Изменить максимальную стоимость</span>
                </button>
              </div>
            </div>
          </div>
        </fieldset>
        <div class="catalog-filter-buttons">
          <button class="catalog-filter-button button" type="submit">Применить</button>
          <button class="catalog-filter-reset" type="reset">Сбросить</button>
        </div>
      </form>
    </section>

  </main>
</body>
</html>
